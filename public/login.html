<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login Magalu System</title>
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Magalu System">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <link rel="icon" href="./icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="auth-body auth-body--magalu">
  <main class="auth-mobile-shell">
    <section class="auth-mobile-hero" aria-label="Apresentacao do aplicativo">
      <div class="auth-mobile-brand">
        <img class="auth-mobile-logo" src="./assets/img/magalu-logo-white.png" alt="Magalu">
      </div>

      <div class="auth-mobile-copy">
        <h1 class="auth-mobile-title">Bem-vindo!<br>Sua experiencia<br>comeca aqui.</h1>
      </div>
    </section>

    <section class="auth-mobile-panel">
      <form id="login-form" class="auth-mobile-form">
        <label class="sr-only" for="id_magalu">ID Magalu</label>
        <input
          id="id_magalu"
          name="id_magalu"
          class="auth-mobile-input"
          type="text"
          placeholder="Digite seu ID Magalu"
          autocomplete="off"
          required
        >

        <button id="login-button" class="auth-mobile-primary" type="submit" aria-label="Acessar">
          <img class="auth-mobile-primary-image" src="./assets/img/btn-index.png" alt="">
        </button>

        <div class="auth-mobile-actions">
          <button id="update-button" class="auth-mobile-link" type="button">Atualizar app</button>
          <button id="install-button" class="auth-mobile-link" type="button" hidden>Instalar app</button>
        </div>
      </form>

      <p id="login-message" class="form-message auth-mobile-status" aria-live="polite"></p>
      <p id="update-message" class="form-message auth-mobile-update" hidden></p>
    </section>
  </main>

  <script src="./js/runtime-config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/pwa.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>

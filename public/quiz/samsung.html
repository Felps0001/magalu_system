<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Samsung - Magalu System</title>
  <meta name="theme-color" content="#0086ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Magalu System">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../icons/icon-192.png?v=2" type="image/png">
  <link rel="icon" href="../icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../icons/icon-192.png?v=2">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="quiz-mobile-body">
  <main class="feed-mobile-shell quiz-mobile-shell">
    <button id="quiz-drawer-backdrop" class="feed-backdrop" type="button" hidden aria-label="Fechar menu"></button>

    <aside id="quiz-drawer" class="feed-drawer" aria-hidden="true" hidden>
      <div class="feed-drawer-header">
        <img class="feed-drawer-logo" src="../assets/img/magalu-logo-white.png" alt="Magalu">
        <button id="quiz-close-drawer" class="feed-drawer-close" type="button" aria-label="Fechar menu">×</button>
      </div>

      <div class="feed-drawer-user">
        <strong id="quiz-drawer-user-name">Carregando usuario...</strong>
        <p id="quiz-drawer-user-role">Quiz de treinamento do evento.</p>
      </div>

      <nav class="feed-drawer-nav" aria-label="Navegacao principal">
        <a class="feed-drawer-link" href="../perfil/">Perfil</a>
        <a class="feed-drawer-link" href="../agenda/">Agenda</a>
        <a class="feed-drawer-link" href="../scanner/">Scanner</a>
        <a class="feed-drawer-link" href="../feed/">Feed</a>
      </nav>

      <div class="feed-drawer-actions">
        <button id="update-button" class="feed-drawer-button" type="button">Atualizar app</button>
        <button id="install-button" class="feed-drawer-button" type="button" hidden>Instalar app</button>
        <button id="logout-button" class="feed-drawer-button feed-drawer-button--ghost" type="button">Sair</button>
      </div>
    </aside>

    <section class="feed-top-panel" aria-label="Quiz Samsung">
      <img class="feed-top-image" src="../assets/img/layer-topo.png" alt="Quiz Samsung">
      <div class="feed-top-content">
        <div class="feed-top-bar">
          <img class="feed-top-logo" src="../assets/img/magalu-logo-white.png" alt="Magalu">
          <button id="quiz-menu-button" class="feed-top-menu" type="button" aria-controls="quiz-drawer" aria-expanded="false" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>

        <div class="feed-top-copy">
          <h1 class="feed-top-title">Quiz</h1>
          <p class="feed-top-subtitle">Responda as perguntas e acumule pontos no estande Samsung.</p>
          <div class="feed-top-user">
            <strong id="quiz-user-name">Samsung</strong>
            <p id="quiz-user-role">Valide seus conhecimentos e registre seu check-in ao final.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="quiz-mobile-panel">
      <p id="update-message" class="form-message profile-mobile-update" hidden></p>
      <section class="quiz-mobile-card">
        <div id="quiz" class="quiz-container">
          <!-- Conteudo dinamico -->
        </div>
      </section>
      <a href="../perfil/" class="secondary-button quiz-back-link">Voltar para perfil</a>
    </section>
  </main>
  <script src="../js/runtime-config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/pwa.js"></script>
  <script src="../js/quiz-samsung.js"></script>
</body>
</html>
